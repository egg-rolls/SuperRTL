<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuperRTL Waveform Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Consolas', 'Monaco', 'Courier New', monospace; background: #1e1e1e; color: #d4d4d4; overflow: hidden; height: 100vh; user-select: none; }

/* Header */
.header { background: #252526; padding: 8px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px #3c3c3c solid; height: 40px; }
.header h1 { font-size: 14px; color: #569cd6; white-space: nowrap; }
.search-box { background: #3c3c3c; border: 1px #555 solid; color: #d4d4d4; padding: 4px 8px; border-radius: 3px; width: 200px; font-size: 12px; font-family: inherit; }
.search-box:focus { outline: none; border-color: #569cd6; }
.btn { background: #0e639c; color: white; border: none; padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 11px; font-family: inherit; }
.btn:hover { background: #1177bb; }
.info { font-size: 11px; color: #888; margin-left: auto; white-space: nowrap; }

/* Main container */
.main { position: relative; height: calc(100vh - 40px); overflow: hidden; }

/* Single canvas for everything */
#waveformCanvas { display: block; cursor: crosshair; }

/* Cursor overlay */
.cursor-line { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(255, 255, 0, 0.8); pointer-events: none; z-index: 10; display: none; }
.cursor-label { position: absolute; top: 2px; background: #ff0; color: #000; font-size: 10px; padding: 1px 5px; border-radius: 2px; pointer-events: none; z-index: 11; display: none; white-space: nowrap; }

/* Tooltip */
.tooltip { position: absolute; background: #2d2d2d; border: 1px #555 solid; color: #d4d4d4; padding: 6px 10px; font-size: 11px; border-radius: 4px; pointer-events: none; z-index: 20; display: none; max-width: 300px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.tooltip .sig-name { color: #569cd6; font-weight: bold; margin-bottom: 2px; }
.tooltip .sig-value { color: #4ec9b0; }

/* Loading */
.loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 14px; color: #888; }
</style>
</head>
<body>

<div class="header">
  <h1>SuperRTL Waveform</h1>
  <input type="text" class="search-box" id="searchInput" placeholder="Search signals...">
  <button class="btn" id="fitBtn">Fit (0)</button>
  <button class="btn" id="zoomInBtn">Zoom In (+)</button>
  <button class="btn" id="zoomOutBtn">Zoom Out (-)</button>
  <span class="info" id="infoText">Loading...</span>
</div>

<div class="main" id="mainContainer">
  <canvas id="waveformCanvas"></canvas>
  <div class="cursor-line" id="cursorLine"></div>
  <div class="cursor-label" id="cursorLabel"></div>
  <div class="tooltip" id="tooltip"></div>
  <div class="loading" id="loading">Loading waveform data...</div>
</div>

<script>
// ===== Constants =====
const SIGNAL_HEIGHT = 26;
const SIGNAL_NAME_WIDTH = 200;
const RULER_HEIGHT = 22;
const COLORS = ['#4ec9b0', '#608b4e', '#dcdcaa', '#9cdcfe', '#c586c0', '#ce9178', '#b5cea8', '#d7ba7d'];

// ===== State =====
let waveformData = null;
let displaySignals = [];
let viewStart = 0;
let viewEnd = 0;
let pixelsPerTime = 1;
let scrollTop = 0;
let isDragging = false;
let dragStartX = 0;
let hoverSignalIdx = -1;
let hoverTime = -1;

// ===== DOM =====
const canvas = document.getElementById('waveformCanvas');
const ctx = canvas.getContext('2d');
const mainContainer = document.getElementById('mainContainer');
const searchInput = document.getElementById('searchInput');
const infoText = document.getElementById('infoText');
const loadingEl = document.getElementById('loading');
const cursorLine = document.getElementById('cursorLine');
const cursorLabel = document.getElementById('cursorLabel');
const tooltipEl = document.getElementById('tooltip');

// ===== Data Loading =====
async function loadData() {
  try {
    const resp = await fetch('/api/data');
    waveformData = await resp.json();
    if (!waveformData.success) {
      loadingEl.textContent = 'Error: ' + (waveformData.error || 'Failed to load');
      return;
    }
    loadingEl.style.display = 'none';
    initDisplay();
  } catch (e) {
    loadingEl.textContent = 'Failed to connect to server';
  }
}

function initDisplay() {
  displaySignals = [];
  for (const [name, data] of Object.entries(waveformData.signals)) {
    displaySignals.push({
      name,
      width: data.width,
      values: data.values,
      visible: true,
      color: COLORS[displaySignals.length % COLORS.length]
    });
  }
  displaySignals.sort((a, b) => a.name.localeCompare(b.name));

  viewStart = waveformData.time_range.start;
  viewEnd = waveformData.time_range.end;
  if (viewEnd <= viewStart) viewEnd = viewStart + 1000;

  resizeCanvas();
  render();
  updateInfo();
}

// ===== Canvas Resize =====
function resizeCanvas() {
  const w = mainContainer.clientWidth;
  const h = mainContainer.clientHeight;
  canvas.width = w * devicePixelRatio;
  canvas.height = h * devicePixelRatio;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}

// ===== Rendering =====
function render() {
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;

  ctx.clearRect(0, 0, w, h);

  // Background
  ctx.fillStyle = '#1e1e1e';
  ctx.fillRect(0, 0, w, h);

  // Get visible signals
  const visibleSigs = displaySignals.filter(s => s.visible);
  if (visibleSigs.length === 0) return;

  pixelsPerTime = (w - SIGNAL_NAME_WIDTH) / (viewEnd - viewStart);

  // Draw ruler
  drawRuler(w);

  // Draw signals
  const waveformStartY = RULER_HEIGHT;
  let y = waveformStartY - scrollTop;

  for (let i = 0; i < visibleSigs.length; i++) {
    const sig = visibleSigs[i];
    if (y + SIGNAL_HEIGHT < waveformStartY) { y += SIGNAL_HEIGHT; continue; }
    if (y > h) break;

    // Row background (alternating)
    const isHover = (hoverSignalIdx === i);
    if (isHover) {
      ctx.fillStyle = '#2a2d2e';
    } else {
      ctx.fillStyle = i % 2 === 0 ? '#1e1e1e' : '#222222';
    }
    ctx.fillRect(0, y, w, SIGNAL_HEIGHT);

    // Grid line at row bottom
    ctx.strokeStyle = '#2d2d2d';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(0, y + SIGNAL_HEIGHT);
    ctx.lineTo(w, y + SIGNAL_HEIGHT);
    ctx.stroke();

    // Draw signal name (left side)
    drawSignalName(sig, i, y, isHover);

    // Draw waveform (right side)
    if (sig.width === 1) {
      drawDigitalWaveform(sig, y, w);
    } else {
      drawBusWaveform(sig, y, w);
    }

    y += SIGNAL_HEIGHT;
  }

  // Draw vertical grid lines
  drawGridLines(w, h);

  // Draw separator between name and waveform
  ctx.strokeStyle = '#3c3c3c';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(SIGNAL_NAME_WIDTH, 0);
  ctx.lineTo(SIGNAL_NAME_WIDTH, h);
  ctx.stroke();
}

function drawRuler(w) {
  // Ruler background
  ctx.fillStyle = '#2d2d2d';
  ctx.fillRect(0, 0, w, RULER_HEIGHT);

  // Ruler bottom border
  ctx.strokeStyle = '#3c3c3c';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, RULER_HEIGHT);
  ctx.lineTo(w, RULER_HEIGHT);
  ctx.stroke();

  // Time ticks
  const timeRange = viewEnd - viewStart;
  let tickInterval = Math.pow(10, Math.floor(Math.log10(timeRange / 8)));
  if (timeRange / tickInterval > 20) tickInterval *= 2;
  if (timeRange / tickInterval < 4) tickInterval /= 2;

  ctx.fillStyle = '#888';
  ctx.font = '10px Consolas, monospace';
  ctx.textAlign = 'center';
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 0.5;

  const startTime = Math.ceil(viewStart / tickInterval) * tickInterval;
  for (let t = startTime; t <= viewEnd; t += tickInterval) {
    const x = SIGNAL_NAME_WIDTH + (t - viewStart) * pixelsPerTime;
    if (x < SIGNAL_NAME_WIDTH || x > w) continue;

    ctx.beginPath();
    ctx.moveTo(x, RULER_HEIGHT - 5);
    ctx.lineTo(x, RULER_HEIGHT);
    ctx.stroke();

    ctx.fillText(formatTime(t), x, RULER_HEIGHT - 7);
  }
}

function drawGridLines(w, h) {
  const timeRange = viewEnd - viewStart;
  let tickInterval = Math.pow(10, Math.floor(Math.log10(timeRange / 8)));
  if (timeRange / tickInterval > 20) tickInterval *= 2;
  if (timeRange / tickInterval < 4) tickInterval /= 2;

  ctx.strokeStyle = '#252525';
  ctx.lineWidth = 0.5;

  const startTime = Math.ceil(viewStart / tickInterval) * tickInterval;
  for (let t = startTime; t <= viewEnd; t += tickInterval) {
    const x = SIGNAL_NAME_WIDTH + (t - viewStart) * pixelsPerTime;
    if (x <= SIGNAL_NAME_WIDTH || x > w) continue;

    ctx.beginPath();
    ctx.moveTo(x, RULER_HEIGHT);
    ctx.lineTo(x, h);
    ctx.stroke();
  }
}

function drawSignalName(sig, idx, y, isHover) {
  const centerY = y + SIGNAL_HEIGHT / 2;

  // Color indicator
  ctx.fillStyle = sig.color;
  ctx.fillRect(4, centerY - 4, 8, 8);

  // Signal name
  ctx.fillStyle = isHover ? '#fff' : '#d4d4d4';
  ctx.font = '11px Consolas, monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';

  const displayName = sig.name.length > 24 ? sig.name.substring(0, 22) + '..' : sig.name;
  ctx.fillText(displayName, 18, centerY);

  // Width indicator for buses
  if (sig.width > 1) {
    ctx.fillStyle = '#666';
    ctx.font = '9px Consolas, monospace';
    ctx.textAlign = 'right';
    ctx.fillText(`[${sig.width-1}:0]`, SIGNAL_NAME_WIDTH - 6, centerY);
  }
}

function drawDigitalWaveform(sig, y, w) {
  const values = sig.values;
  if (!values || values.length === 0) return;

  const highY = y + 4;
  const lowY = y + SIGNAL_HEIGHT - 4;

  ctx.strokeStyle = sig.color;
  ctx.fillStyle = sig.color;
  ctx.lineWidth = 1.5;
  ctx.beginPath();

  let started = false;
  let prevVal = null;

  for (let i = 0; i < values.length; i++) {
    const v = values[i];
    const x = SIGNAL_NAME_WIDTH + (v.time - viewStart) * pixelsPerTime;

    if (x > w + 10) break;
    if (x < SIGNAL_NAME_WIDTH - 10) { prevVal = v.value; continue; }

    const val = v.value;
    const isHigh = (val === '1' || val === 'H');
    const isLow = (val === '0' || val === 'L');

    if (!started) {
      ctx.moveTo(x, isHigh ? highY : lowY);
      started = true;
    } else {
      // Vertical transition
      if (prevVal !== val) {
        ctx.lineTo(x, prevVal === '1' || prevVal === 'H' ? highY : lowY);
        ctx.lineTo(x, isHigh ? highY : lowY);
      }
    }

    // Horizontal line
    const nextX = i < values.length - 1
      ? SIGNAL_NAME_WIDTH + (values[i+1].time - viewStart) * pixelsPerTime
      : w;
    ctx.lineTo(Math.min(nextX, w), isHigh ? highY : lowY);

    prevVal = val;
  }

  ctx.stroke();
  ctx.lineWidth = 1;
}

function drawBusWaveform(sig, y, w) {
  const values = sig.values;
  if (!values || values.length === 0) return;

  const topY = y + 3;
  const botY = y + SIGNAL_HEIGHT - 3;
  const midY = y + SIGNAL_HEIGHT / 2;

  for (let i = 0; i < values.length; i++) {
    const v = values[i];
    const x = SIGNAL_NAME_WIDTH + (v.time - viewStart) * pixelsPerTime;

    if (x > w + 10) break;
    if (x < SIGNAL_NAME_WIDTH - 10) continue;

    const nextX = i < values.length - 1
      ? SIGNAL_NAME_WIDTH + (values[i+1].time - viewStart) * pixelsPerTime
      : w;

    const drawX = Math.max(x, SIGNAL_NAME_WIDTH);
    const drawNextX = Math.min(nextX, w);

    if (drawNextX <= drawX) continue;

    // Bus band fill
    ctx.fillStyle = sig.color + '15';
    ctx.beginPath();
    ctx.moveTo(drawX, topY);
    ctx.lineTo(drawNextX, topY);
    ctx.lineTo(drawNextX, botY);
    ctx.lineTo(drawX, botY);
    ctx.closePath();
    ctx.fill();

    // Top and bottom edges
    ctx.strokeStyle = sig.color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(drawX, topY);
    ctx.lineTo(drawNextX, topY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(drawX, botY);
    ctx.lineTo(drawNextX, botY);
    ctx.stroke();

    // Vertical edges
    if (x >= SIGNAL_NAME_WIDTH) {
      ctx.beginPath();
      ctx.moveTo(x, topY);
      ctx.lineTo(x, botY);
      ctx.stroke();
    }

    // Value text
    const displayVal = formatBusValue(v.value);
    if (drawNextX - drawX > 30) {
      ctx.fillStyle = sig.color;
      ctx.font = '10px Consolas, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(displayVal, (drawX + drawNextX) / 2, midY);
    }
  }
}

function formatBusValue(val) {
  if (!val) return '?';
  if (/^[01xzXZ]+$/.test(val)) {
    const padded = val.padStart(Math.ceil(val.length / 4) * 4, '0');
    let hex = '';
    for (let i = 0; i < padded.length; i += 4) {
      const nibble = padded.substr(i, 4);
      if (/^[01]+$/.test(nibble)) {
        hex += parseInt(nibble, 2).toString(16).toUpperCase();
      } else {
        hex += 'X';
      }
    }
    return '0x' + hex;
  }
  return val;
}

function formatTime(t) {
  if (t >= 1000000000) return (t / 1000000000).toFixed(2) + 's';
  if (t >= 1000000) return (t / 1000000).toFixed(2) + 'ms';
  if (t >= 1000) return (t / 1000).toFixed(1) + 'us';
  return t + 'ns';
}

// ===== View Control =====
function fitView() {
  viewStart = waveformData.time_range.start;
  viewEnd = waveformData.time_range.end;
  scrollTop = 0;
  render();
  updateInfo();
}

function zoomIn() {
  const center = (viewStart + viewEnd) / 2;
  const range = (viewEnd - viewStart) / 2;
  viewStart = center - range * 0.7;
  viewEnd = center + range * 0.7;
  render();
  updateInfo();
}

function zoomOut() {
  const center = (viewStart + viewEnd) / 2;
  const range = (viewEnd - viewStart) / 2;
  viewStart = center - range * 1.4;
  viewEnd = center + range * 1.4;
  render();
  updateInfo();
}

function updateInfo() {
  const visibleCount = displaySignals.filter(s => s.visible).length;
  infoText.textContent = `${visibleCount}/${displaySignals.length} signals | ${formatTime(viewStart)} - ${formatTime(viewEnd)}`;
}

// ===== Signal Search =====
function filterSignals() {
  const filter = searchInput.value.toLowerCase();
  for (const sig of displaySignals) {
    sig.visible = !filter || sig.name.toLowerCase().includes(filter);
  }
  scrollTop = 0;
  render();
  updateInfo();
}

// ===== Event Handlers =====

// Mouse wheel zoom
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;

  // Only zoom on waveform area
  if (mouseX < SIGNAL_NAME_WIDTH) return;

  const mouseTime = viewStart + (mouseX - SIGNAL_NAME_WIDTH) / pixelsPerTime;
  const factor = e.deltaY > 0 ? 1.15 : 0.85;

  viewStart = mouseTime - (mouseTime - viewStart) * factor;
  viewEnd = mouseTime + (viewEnd - mouseTime) * factor;

  render();
  updateInfo();
}, { passive: false });

// Mouse down
canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  if (x >= SIGNAL_NAME_WIDTH) {
    isDragging = true;
    dragStartX = e.clientX;
    canvas.style.cursor = 'grabbing';
  }
});

// Mouse move
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  // Drag to pan
  if (isDragging) {
    const dx = e.clientX - dragStartX;
    const timeShift = dx / pixelsPerTime;
    viewStart -= timeShift;
    viewEnd -= timeShift;
    dragStartX = e.clientX;
    render();
    updateInfo();
    return;
  }

  // Cursor tracking on waveform area
  if (x >= SIGNAL_NAME_WIDTH && y >= RULER_HEIGHT) {
    const time = viewStart + (x - SIGNAL_NAME_WIDTH) / pixelsPerTime;

    // Show cursor
    cursorLine.style.display = 'block';
    cursorLine.style.left = x + 'px';

    cursorLabel.style.display = 'block';
    cursorLabel.style.left = (x + 8) + 'px';
    cursorLabel.textContent = formatTime(time);

    // Find hovered signal
    const sigIdx = Math.floor((y - RULER_HEIGHT + scrollTop) / SIGNAL_HEIGHT);
    const visibleSigs = displaySignals.filter(s => s.visible);
    if (sigIdx >= 0 && sigIdx < visibleSigs.length) {
      hoverSignalIdx = sigIdx;
      const sig = visibleSigs[sigIdx];

      // Find value at this time
      let value = '?';
      for (let i = sig.values.length - 1; i >= 0; i--) {
        if (sig.values[i].time <= time) {
          value = sig.values[i].value;
          break;
        }
      }

      // Show tooltip
      tooltipEl.style.display = 'block';
      tooltipEl.style.left = (e.clientX + 12) + 'px';
      tooltipEl.style.top = (e.clientY - 10) + 'px';
      tooltipEl.innerHTML = `
        <div class="sig-name">${escapeHtml(sig.name)}</div>
        <div class="sig-value">${formatBusValue(value)}</div>
        <div style="color:#888;margin-top:2px">${formatTime(time)}</div>
      `;
    } else {
      hoverSignalIdx = -1;
      tooltipEl.style.display = 'none';
    }

    render();
  } else {
    cursorLine.style.display = 'none';
    cursorLabel.style.display = 'none';
    tooltipEl.style.display = 'none';
    hoverSignalIdx = -1;
  }
});

// Mouse up
document.addEventListener('mouseup', () => {
  if (isDragging) {
    isDragging = false;
    canvas.style.cursor = 'crosshair';
  }
});

// Mouse leave
canvas.addEventListener('mouseleave', () => {
  cursorLine.style.display = 'none';
  cursorLabel.style.display = 'none';
  tooltipEl.style.display = 'none';
  hoverSignalIdx = -1;
  render();
});

// Vertical scroll
canvas.addEventListener('wheel', (e) => {
  if (e.ctrlKey || e.metaKey) return; // zoom handled above
  const visibleSigs = displaySignals.filter(s => s.visible);
  const maxScroll = Math.max(0, visibleSigs.length * SIGNAL_HEIGHT - (canvas.height / devicePixelRatio - RULER_HEIGHT));

  scrollTop = Math.max(0, Math.min(maxScroll, scrollTop + e.deltaY));
  render();
}, { passive: true });

// Search
searchInput.addEventListener('input', filterSignals);

// Buttons
document.getElementById('fitBtn').addEventListener('click', fitView);
document.getElementById('zoomInBtn').addEventListener('click', zoomIn);
document.getElementById('zoomOutBtn').addEventListener('click', zoomOut);

// Resize
window.addEventListener('resize', () => {
  resizeCanvas();
  render();
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (document.activeElement === searchInput) return;

  if (e.key === '+' || e.key === '=') zoomIn();
  if (e.key === '-') zoomOut();
  if (e.key === '0' || e.key === 'f' || e.key === 'F') fitView();
  if (e.key === 'ArrowLeft') {
    const shift = (viewEnd - viewStart) * 0.1;
    viewStart -= shift;
    viewEnd -= shift;
    render();
    updateInfo();
  }
  if (e.key === 'ArrowRight') {
    const shift = (viewEnd - viewStart) * 0.1;
    viewStart += shift;
    viewEnd += shift;
    render();
    updateInfo();
  }
  if (e.key === 'ArrowUp') {
    scrollTop = Math.max(0, scrollTop - SIGNAL_HEIGHT * 3);
    render();
  }
  if (e.key === 'ArrowDown') {
    scrollTop += SIGNAL_HEIGHT * 3;
    render();
  }
});

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ===== Start =====
loadData();
</script>
</body>
</html>
